name: Enforce Branch Rules

on:
  pull_request:
    branches:
      - main
      - staging

jobs:
  check-branch:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Validate branch flow
        shell: bash
        run: |
          echo "Base: ${{ github.base_ref }}"
          echo "Head: ${{ github.head_ref }}"

          if [[ "${{ github.base_ref }}" == "main" && "${{ github.head_ref }}" != "staging" ]]; then
            echo "❌ Only staging can merge into main"
            exit 1
          fi

          echo "✅ Branch rule passed"
